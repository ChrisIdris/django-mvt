<!-- delete_student.html -->
{% extends 'base.html' %}

{% block title %}Delete Student{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h1 class="mb-0">Delete Student</h1>
            <small class="text-muted">This action cannot be undone.</small>
        </div>
        <div class="card-body">
            <p>Are you sure you want to delete <strong>{{ student.name }}</strong>?</p>
            <p class="text-muted">Email: {{ student.email }}</p>

            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url 'student_list' %}" class="btn btn-secondary ml-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
