<!-- delete_student.html -->
{% extends 'base.html' %}

{% block title %}Delete Student{% endblock %}

{% block content %}
<h1>Delete Student</h1>
<p>Are you sure you want to delete {{ student.name }}?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
    <a href="{% url 'student_list' %}">Cancel</a>
</form>
{% endblock %}
